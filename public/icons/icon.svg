<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#12131A"/>
      <stop offset="100%" style="stop-color:#0A0B0F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B83FF"/>
      <stop offset="100%" style="stop-color:#6C63FF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Compass/waypoint marker -->
  <g transform="translate(256,256)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="url(#accent)" stroke-width="12" opacity="0.3"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="url(#accent)" stroke-width="8" opacity="0.5"/>
    <!-- Waypoint diamond/pin -->
    <path d="M0,-120 L35,-40 L0,120 L-35,-40 Z" fill="url(#accent)" opacity="0.9"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="20" fill="url(#accent)"/>
    <!-- Cardinal dots -->
    <circle cx="0" cy="-160" r="8" fill="#8B83FF" opacity="0.6"/>
    <circle cx="160" cy="0" r="8" fill="#8B83FF" opacity="0.6"/>
    <circle cx="0" cy="160" r="8" fill="#8B83FF" opacity="0.6"/>
    <circle cx="-160" cy="0" r="8" fill="#8B83FF" opacity="0.6"/>
  </g>
</svg>
